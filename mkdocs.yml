site_name: SynapCores Documentation
site_description: Self-hosted AI-native database — operator and developer docs.
site_url: https://docs.synapcores.com
copyright: Copyright &copy; SynapCores

repo_name: SynapCores/synapcores-docs
repo_url: https://github.com/SynapCores/synapcores-docs
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/SynapCores
    - icon: fontawesome/solid/globe
      link: https://synapcores.com

nav:
  - Home: index.md
  - Getting started:
      - Quickstart: quickstart.md
      - Hardware requirements: requirements.md
      - First-run AI setup: ai-setup.md
      - Web UI: web-ui.md
      - Run on macOS: macos.md
  - Reference:
      - Limits & quotas: limits.md
      - Filesystem Collections: filesystem-rag.md
      - Community vs Enterprise: enterprise.md
  - Support: support.md
