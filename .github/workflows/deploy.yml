name: Build and deploy docs

# Builds the MkDocs Material site on every push to main and deploys it
# to GitHub Pages. Uses the modern Pages-from-Actions pipeline (no
# gh-pages branch); the artifact uploaded by `actions/upload-pages-artifact`
# is what GitHub serves at https://docs.synapcores.com.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; cancel any in-flight deploy if a newer
# push lands.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Install MkDocs Material
        run: pip install -r requirements.txt

      - name: Build site
        run: mkdocs build --strict --site-dir _site

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    name: Deploy
    runs-on: ubuntu-22.04
    needs: build
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
